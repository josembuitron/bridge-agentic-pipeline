    <text x="420" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">Edge case hunting</text>

    <rect x="508" y="54" width="152" height="60" rx="8" fill="rgba(220,38,38,0.08)" stroke="#dc2626" stroke-width="0.5"/>
    <text x="584" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#dc2626">Security Auditor</text>
    <text x="584" y="88" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">SAST + secrets scan</text>
    <text x="584" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">Vulnerability analysis</text>

    <rect x="672" y="54" width="148" height="60" rx="8" fill="rgba(168,85,247,0.08)" stroke="#a855f7" stroke-width="0.5"/>
    <text x="746" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#a855f7">PR Review Toolkit</text>
    <text x="746" y="88" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">6 parallel sub-agents</text>
