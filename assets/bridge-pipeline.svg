    <text x="82" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Approve / modify /</text>
    <text x="82" y="86" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">go back / stop at</text>
