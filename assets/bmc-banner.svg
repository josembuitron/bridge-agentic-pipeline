<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="900" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFDD00"/>
      <stop offset="100%" style="stop-color:#FFB800"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-10%" width="104%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#00000020"/>
    </filter>
  </defs>
  <rect width="900" height="160" rx="20" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <!-- Coffee cup -->
  <g transform="translate(60, 30)">
    <!-- Cup body -->
    <rect x="10" y="25" width="60" height="65" rx="8" fill="#1a1a1a" opacity="0.85"/>
    <!-- Cup handle -->
    <path d="M70,40 Q92,40 92,60 Q92,78 70,78" fill="none" stroke="#1a1a1a" stroke-width="7" opacity="0.85"/>
    <!-- Steam lines -->
    <path d="M25,20 Q30,5 25,-5" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M40,15 Q45,0 40,-10" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M55,20 Q60,5 55,-5" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <!-- Saucer -->
    <ellipse cx="40" cy="95" rx="45" ry="8" fill="#1a1a1a" opacity="0.15"/>
  </g>
  <!-- Main text -->
  <text x="180" y="68" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="28" font-weight="800" fill="#1a1a1a" letter-spacing="-0.5">
    If this project adds value to your work
  </text>
  <!-- Sub text -->
  <text x="180" y="105" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="22" font-weight="600" fill="#1a1a1a" opacity="0.75">
    consider supporting it by buying me a coffee
  </text>
  <!-- Button -->
  <rect x="180" y="118" width="200" height="32" rx="16" fill="#1a1a1a" opacity="0.85"/>
  <text x="224" y="140" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#FFDD00">
    buymeacoffee.com
  </text>
  <!-- Arrow hint -->
  <text x="830" y="85" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="36" fill="#1a1a1a" opacity="0.25" text-anchor="middle">
    &gt;
  </text>
</svg>
